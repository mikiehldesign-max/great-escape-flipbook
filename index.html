<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Great Escape – Interactive Book</title>
<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: Georgia, serif;
    overflow: hidden;
  }

  #book-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  #flipbook-wrapper {
    filter: drop-shadow(0 20px 50px rgba(0,0,0,0.9));
  }

  #flipbook { display: block; }

  /* Controls */
  #controls {
    display: flex;
    align-items: center;
    gap: 16px;
    user-select: none;
  }

  .ctrl-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ctrl-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.08); }
  .ctrl-btn:active { transform: scale(0.93); }
  .ctrl-btn:disabled { opacity: 0.25; cursor: default; transform: none; }

  #page-indicator {
    color: rgba(255,255,255,0.6);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    min-width: 110px;
    text-align: center;
  }

  /* Loading screen */
  #loader {
    position: fixed;
    inset: 0;
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 999;
    gap: 16px;
    transition: opacity 0.6s ease;
  }
  #loader.hidden { opacity: 0; pointer-events: none; }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,0.12);
    border-top-color: rgba(255,255,255,0.8);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loader p { color: rgba(255,255,255,0.45); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; }

  @media (max-width: 700px) {
    body { justify-content: flex-start; padding-top: 16px; overflow-y: auto; }
  }
</style>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  <p>Loading book…</p>
</div>

<div id="book-container">
  <div id="flipbook-wrapper">
    <div id="flipbook"></div>
  </div>
  <div id="controls">
    <button class="ctrl-btn" id="btn-prev" title="Previous page">←</button>
    <span id="page-indicator">Front Cover</span>
    <button class="ctrl-btn" id="btn-next" title="Next page">→</button>
  </div>
</div>

<script>
(function () {
  var BASE = 'https://raw.githubusercontent.com/mikiehldesign-max/Great-Escape-OLD/main/';
  var pages = [];
  for (var i = 1; i <= 18; i++) {
    var n = String(i).padStart(2, '0');
    pages.push(BASE + 'great_escape_2013_book_hi__Page_' + n + '.jpg');
  }

  // One page is square: width == height
  // In landscape mode (2 pages side by side), total canvas = 2 * pageSize
  function calcSize() {
    var vw = window.innerWidth;
    var vh = window.innerHeight - 90; // leave room for controls
    // We want two pages side by side: total spread width = 2 * pageSize
    var byH = Math.floor(vh);
    var byW = Math.floor(vw / 2);
    var ps = Math.min(byH, byW, 460); // max page size 460px
    ps = Math.max(ps, 140);
    return ps;
  }

  var loaded = 0;
  var total = pages.length;

  function preload(srcs, done) {
    srcs.forEach(function(src) {
      var img = new Image();
      img.onload = img.onerror = function() {
        if (++loaded >= total) done();
      };
      img.src = src;
    });
  }

  preload(pages, init);

  var pageFlip;

  function init() {
    document.getElementById('loader').classList.add('hidden');

    var ps = calcSize();

    pageFlip = new St.PageFlip(
      document.getElementById('flipbook'),
      {
        width:  ps,
        height: ps,
        size: 'fixed',
        maxShadowOpacity: 0.7,
        showCover: true,
        mobileScrollSupport: false,
        useMouseEvents: true,
        drawShadow: true,
        flippingTime: 800,
        startPage: 0,
        autoSize: false,
        usePortrait: false
      }
    );

    pageFlip.loadFromImages(pages);
    pageFlip.on('flip', updateUI);
    pageFlip.on('init', updateUI);

    var btnPrev = document.getElementById('btn-prev');
    var btnNext = document.getElementById('btn-next');

    btnPrev.addEventListener('click', function() { pageFlip.flipPrev(); });
    btnNext.addEventListener('click', function() { pageFlip.flipNext(); });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowRight') pageFlip.flipNext();
      if (e.key === 'ArrowLeft')  pageFlip.flipPrev();
    });

    window.addEventListener('resize', function() {
      var ns = calcSize();
      pageFlip.update({ width: ns, height: ns });
    });
  }

  function updateUI() {
    var cur = pageFlip.getCurrentPageIndex();
    var btnPrev = document.getElementById('btn-prev');
    var btnNext = document.getElementById('btn-next');
    var indicator = document.getElementById('page-indicator');

    btnPrev.disabled = (cur <= 0);
    btnNext.disabled = (cur >= total - 1);

    if (cur === 0) {
      indicator.textContent = 'Front Cover';
    } else if (cur >= total - 1) {
      indicator.textContent = 'Back Cover';
    } else {
      indicator.textContent = 'Page ' + cur + ' of ' + (total - 2);
    }
  }
})();
</script>
</body>
</html>
