<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Great Escape – Interactive Book</title>
<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: Georgia, serif;
    overflow: hidden;
  }

  #book-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  #flipbook-wrapper {
    filter: drop-shadow(0 20px 50px rgba(0,0,0,0.9));
  }

  #flipbook { display: block; }

  /* Controls */
  #controls {
    display: flex;
    align-items: center;
    gap: 16px;
    user-select: none;
  }

  .ctrl-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ctrl-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.08); }
  .ctrl-btn:active { transform: scale(0.93); }
  .ctrl-btn:disabled { opacity: 0.25; cursor: default; transform: none; }

  #page-indicator {
    color: rgba(255,255,255,0.6);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    min-width: 130px;
    text-align: center;
  }

  /* Loading screen */
  #loader {
    position: fixed;
    inset: 0;
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 999;
    gap: 16px;
    transition: opacity 0.6s ease;
  }
  #loader.hidden { opacity: 0; pointer-events: none; }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,0.12);
    border-top-color: rgba(255,255,255,0.8);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loader p { color: rgba(255,255,255,0.45); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; }

  @media (max-width: 700px) {
    body { justify-content: flex-start; padding-top: 16px; overflow-y: auto; }
  }
</style>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  <p>Loading book…</p>
</div>

<div id="book-container">
  <div id="flipbook-wrapper">
    <div id="flipbook"></div>
  </div>
  <div id="controls">
    <button class="ctrl-btn" id="btn-prev" title="Previous page">←</button>
    <span id="page-indicator">Front Cover</span>
    <button class="ctrl-btn" id="btn-next" title="Next page">→</button>
  </div>
</div>

<script>
(function () {

  /*
   * Page layout:
   *   Page 0  = front cover  (single, right side)
   *   Pages 1-16 = interior  (shown as two-page spreads)
   *   Page 17 = back cover   (single, left side)
   *
   * StPageFlip with showCover:true handles exactly this:
   * the first and last images are rendered full-width as
   * covers, everything in between is shown as a spread.
   *
   * The key is setting the PAGE size (not the spread size).
   * StPageFlip draws each page at {width, height} and places
   * two of them side-by-side automatically.  So we just need
   * to size each page as a square that fits the viewport.
   */

  var BASE = 'https://raw.githubusercontent.com/mikiehldesign-max/Great-Escape-OLD/main/';
  var pages = [];
  for (var i = 1; i <= 18; i++) {
    var n = String(i).padStart(2, '0');
    pages.push(BASE + 'great_escape_2013_book_hi__Page_' + n + '.jpg');
  }
  var TOTAL = pages.length; // 18

  /* ---- sizing ---------------------------------------------------------- */
  function calcPageSize() {
    var vw = window.innerWidth  - 48;   // 24px padding each side
    var vh = window.innerHeight - 100;  // room for controls + gap

    // In spread mode the canvas is 2 * pageSize wide.
    // Each page is square so height == pageSize.
    var byW = Math.floor(vw / 2);  // half the available width
    var byH = Math.floor(vh);       // full available height

    var ps = Math.min(byW, byH, 500);
    return Math.max(ps, 120);
  }

  /* ---- preload all images, then init ------------------------------------ */
  var loadedCount = 0;
  function preload(done) {
    pages.forEach(function(src) {
      var img = new Image();
      img.onload = img.onerror = function() {
        if (++loadedCount >= TOTAL) done();
      };
      img.src = src;
    });
  }

  preload(init);

  /* ---- initialise flipbook --------------------------------------------- */
  var pageFlip;

  function init() {
    document.getElementById('loader').classList.add('hidden');

    var ps = calcPageSize();

    pageFlip = new St.PageFlip(
      document.getElementById('flipbook'),
      {
        width:            ps,   // single-page width
        height:           ps,   // single-page height (square pages)
        size:             'fixed',
        maxShadowOpacity: 0.65,
        showCover:        true, // <-- first & last pages become single covers
        usePortrait:      false,// <-- always use landscape (spread) layout
        mobileScrollSupport: false,
        useMouseEvents:   true,
        drawShadow:       true,
        flippingTime:     900,
        startPage:        0,
        autoSize:         false
      }
    );

    pageFlip.loadFromImages(pages);
    pageFlip.on('flip', updateUI);
    pageFlip.on('init', updateUI);

    /* buttons */
    document.getElementById('btn-prev')
      .addEventListener('click', function() { pageFlip.flipPrev(); });
    document.getElementById('btn-next')
      .addEventListener('click', function() { pageFlip.flipNext(); });

    /* keyboard */
    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') pageFlip.flipNext();
      if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   pageFlip.flipPrev();
    });

    /* resize */
    window.addEventListener('resize', function() {
      var ns = calcPageSize();
      pageFlip.update({ width: ns, height: ns });
    });
  }

  /* ---- update controls label ------------------------------------------- */
  function updateUI() {
    var cur  = pageFlip.getCurrentPageIndex();
    var btnP = document.getElementById('btn-prev');
    var btnN = document.getElementById('btn-next');
    var ind  = document.getElementById('page-indicator');

    btnP.disabled = (cur <= 0);
    btnN.disabled = (cur >= TOTAL - 1);

    if (cur === 0) {
      ind.textContent = 'Front Cover';
    } else if (cur >= TOTAL - 1) {
      ind.textContent = 'Back Cover';
    } else {
      // Interior: StPageFlip flips in steps of 2, so cur is always odd
      // for left pages.  Show it as a spread number.
      var spread = Math.ceil(cur / 2);
      var totalSpreads = Math.floor((TOTAL - 2) / 2);
      ind.textContent = 'Spread ' + spread + ' of ' + totalSpreads;
    }
  }

})();
</script>
</body>
</html>
