<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Great Escape – Interactive Book</title>
<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: Georgia, serif;
    overflow: hidden;
  }

  #book-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  /*
   * #clip-box clips to pageSize (cover) or 2×pageSize (spread).
   * #flipbook-wrapper holds the StPageFlip canvas (always 2×pageSize wide).
   *
   * Canvas layout (landscape + showCover):
   *   front cover → drawn on the RIGHT half of the canvas
   *   spreads     → drawn across the full canvas
   *   back cover  → drawn on the LEFT  half of the canvas
   *
   * To show only the front cover:
   *   clip-box = pageSize wide
   *   wrapper  = translateX(-pageSize)  → right half scrolls into view
   *
   * To show a spread:
   *   clip-box = 2×pageSize wide
   *   wrapper  = translateX(0)          → full canvas visible
   *
   * To show only the back cover:
   *   clip-box = pageSize wide
   *   wrapper  = translateX(0)          → left half is the back cover
   */
  #clip-box {
    overflow: hidden;
    filter: drop-shadow(0 20px 50px rgba(0,0,0,0.9));
  }
  #flipbook-wrapper { display: block; }
  #flipbook         { display: block; }

  /* Controls */
  #controls {
    display: flex;
    align-items: center;
    gap: 16px;
    user-select: none;
  }
  .ctrl-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ctrl-btn:hover  { background: rgba(255,255,255,0.2); transform: scale(1.08); }
  .ctrl-btn:active { transform: scale(0.93); }
  .ctrl-btn:disabled { opacity: 0.25; cursor: default; transform: none; }

  #page-indicator {
    color: rgba(255,255,255,0.6);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    min-width: 130px;
    text-align: center;
  }

  /* Loading screen */
  #loader {
    position: fixed;
    inset: 0;
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 999;
    gap: 16px;
    transition: opacity 0.6s ease;
  }
  #loader.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,0.12);
    border-top-color: rgba(255,255,255,0.8);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loader p {
    color: rgba(255,255,255,0.45);
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  @media (max-width: 700px) {
    body { justify-content: flex-start; padding-top: 16px; overflow-y: auto; overflow-x: hidden; }
  }
</style>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  <p>Loading book…</p>
</div>

<div id="book-container">
  <div id="clip-box">
    <div id="flipbook-wrapper">
      <div id="flipbook"></div>
    </div>
  </div>
  <div id="controls">
    <button class="ctrl-btn" id="btn-prev" title="Previous page">←</button>
    <span id="page-indicator">Front Cover</span>
    <button class="ctrl-btn" id="btn-next" title="Next page">→</button>
  </div>
</div>

<script>
(function () {

  var BASE  = 'https://raw.githubusercontent.com/mikiehldesign-max/Great-Escape-OLD/main/';
  var pages = [];
  for (var i = 1; i <= 18; i++) {
    var n = String(i).padStart(2, '0');
    pages.push(BASE + 'great_escape_2013_book_hi__Page_' + n + '.jpg');
  }
  var TOTAL    = pages.length; // 18
  var pageSize = 0;

  /* ---- sizing ---- */
  function calcPageSize() {
    var vw = window.innerWidth  - 48;
    var vh = window.innerHeight - 100;
    var ps = Math.min(Math.floor(vw / 2), Math.floor(vh), 500);
    return Math.max(ps, 120);
  }

  /* ---- preload ---- */
  var loadedCount = 0;
  function preload(done) {
    pages.forEach(function(src) {
      var img = new Image();
      img.onload = img.onerror = function() { if (++loadedCount >= TOTAL) done(); };
      img.src = src;
    });
  }

  preload(init);

  /* ---- init ---- */
  var pageFlip;

  function init() {
    document.getElementById('loader').classList.add('hidden');
    pageSize = calcPageSize();

    /* Initialise clip without animation */
    setClip(0, false);

    pageFlip = new St.PageFlip(
      document.getElementById('flipbook'),
      {
        width:               pageSize,
        height:              pageSize,
        size:                'fixed',
        maxShadowOpacity:    0.65,
        showCover:           true,
        usePortrait:         false,
        mobileScrollSupport: false,
        useMouseEvents:      true,
        drawShadow:          true,
        flippingTime:        900,
        startPage:           0,
        autoSize:            false
      }
    );

    pageFlip.loadFromImages(pages);
    pageFlip.on('flip',        onFlip);
    pageFlip.on('changeState', onFlip);
    pageFlip.on('init',        onFlip);

    document.getElementById('btn-prev')
      .addEventListener('click', function() { pageFlip.flipPrev(); });
    document.getElementById('btn-next')
      .addEventListener('click', function() { pageFlip.flipNext(); });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') pageFlip.flipNext();
      if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   pageFlip.flipPrev();
    });

    window.addEventListener('resize', function() {
      pageSize = calcPageSize();
      pageFlip.update({ width: pageSize, height: pageSize });
      setClip(pageFlip.getCurrentPageIndex(), false);
    });
  }

  /* ---- setClip ---- */
  function setClip(cur, animate) {
    var clipBox = document.getElementById('clip-box');
    var wrapper = document.getElementById('flipbook-wrapper');
    var T       = animate ? '0.55s cubic-bezier(0.4,0,0.2,1)' : '0s';

    if (cur === 0) {
      /* Front cover: right half of canvas. Shift wrapper left so right half aligns. */
      clipBox.style.width      = pageSize + 'px';
      clipBox.style.height     = pageSize + 'px';
      wrapper.style.transform  = 'translateX(-' + pageSize + 'px)';
    } else if (cur >= TOTAL - 1) {
      /* Back cover: left half of canvas. No shift needed. */
      clipBox.style.width      = pageSize + 'px';
      clipBox.style.height     = pageSize + 'px';
      wrapper.style.transform  = 'translateX(0)';
    } else {
      /* Interior spread: show full canvas. */
      clipBox.style.width      = (pageSize * 2) + 'px';
      clipBox.style.height     = pageSize + 'px';
      wrapper.style.transform  = 'translateX(0)';
    }

    clipBox.style.transition  = 'width '     + T + ', height ' + T;
    wrapper.style.transition  = 'transform ' + T;
  }

  /* ---- onFlip ---- */
  function onFlip() {
    var cur  = pageFlip.getCurrentPageIndex();
    var btnP = document.getElementById('btn-prev');
    var btnN = document.getElementById('btn-next');
    var ind  = document.getElementById('page-indicator');

    btnP.disabled = (cur <= 0);
    btnN.disabled = (cur >= TOTAL - 1);

    setClip(cur, true);

    if (cur === 0) {
      ind.textContent = 'Front Cover';
    } else if (cur >= TOTAL - 1) {
      ind.textContent = 'Back Cover';
    } else {
      var spread       = Math.ceil(cur / 2);
      var totalSpreads = Math.floor((TOTAL - 2) / 2);
      ind.textContent  = 'Spread ' + spread + ' of ' + totalSpreads;
    }
  }

})();
</script>
</body>
</html>
