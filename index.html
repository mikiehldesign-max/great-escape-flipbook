<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Great Escape 2013</title>
  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      padding: 20px 16px 40px;
    }

    #gef-root {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    #clip-window {
      overflow: hidden;
      position: relative;
    }

    #flipbook-container {
      position: relative;
    }

    #nav-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-top: 16px;
    }

    .ctrl-btn {
      background: #1a1a1a;
      color: #ffffff;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .ctrl-btn:hover { background: #444; }

    #page-indicator {
      font-size: 13px;
      font-weight: 600;
      color: #1a1a1a;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      min-width: 160px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="gef-root">
    <div id="clip-window">
      <div id="flipbook-container"></div>
    </div>
    <div id="nav-bar">
      <button class="ctrl-btn" id="btn-prev">&#8592;</button>
      <span id="page-indicator">LOADING...</span>
      <button class="ctrl-btn" id="btn-next">&#8594;</button>
    </div>
  </div>

  <script>
    (function () {
      var BASE = 'https://raw.githubusercontent.com/mikiehldesign-max/Great-Escape-OLD/main/';
      var TOTAL_PAGES = 18;
      var flipbook = null;
      var currentPage = 0;
      var resizeTimer = null;

      function pad(n) {
        return n < 10 ? '0' + n : '' + n;
      }

      function imgUrl(n) {
        return BASE + 'great_escape_2013_book_hi__Page_' + pad(n) + '.jpg';
      }

      function calcPs() {
        var vw = window.innerWidth;
        var vh = window.innerHeight;
        var mobile = vw <= 700;
        var container = document.getElementById('gef-root');
        var cw = container ? container.offsetWidth : vw;

        if (mobile) {
          return Math.min(cw - 32, vh - 140);
        } else {
          return Math.min((cw * 0.95) / 2, vh * 0.85);
        }
      }

      function isMobile() {
        return window.innerWidth <= 700;
      }

      function updateIndicator(page) {
        var ind = document.getElementById('page-indicator');
        if (!ind) return;
        if (page === 0) {
          ind.textContent = '\u2190 FRONT COVER \u2192';
        } else if (page >= TOTAL_PAGES - 1) {
          ind.textContent = '\u2190 BACK COVER \u2192';
        } else {
          var spread = Math.ceil(page / 2);
          var totalSpreads = Math.floor((TOTAL_PAGES - 2) / 2);
          ind.textContent = '\u2190 SPREAD ' + spread + ' OF ' + totalSpreads + ' \u2192';
        }
      }

      function applyView(pageNum, animate, ps) {
        var clip = document.getElementById('clip-window');
        var mobile = isMobile();
        var w, h;

        if (mobile) {
          w = ps;
          h = ps * 1.294;
        } else {
          if (pageNum === 0 || pageNum >= TOTAL_PAGES - 1) {
            w = ps;
            h = ps * 1.294;
          } else {
            w = ps * 2;
            h = ps * 1.294;
          }
        }

        if (clip) {
          clip.style.width = w + 'px';
          clip.style.height = h + 'px';
        }
      }

      function initFlipbook(startPage) {
        var container = document.getElementById('flipbook-container');
        if (!container) return;

        // Destroy existing instance
        if (flipbook) {
          try { flipbook.destroy(); } catch (e) {}
          flipbook = null;
        }
        container.innerHTML = '';

        var ps = calcPs();
        var mobile = isMobile();

        applyView(startPage || 0, false, ps);

        var usePortrait = mobile;

        var config = {
          width: ps,
          height: ps * 1.294,
          size: 'fixed',
          minWidth: ps,
          maxWidth: ps,
          minHeight: ps * 1.294,
          maxHeight: ps * 1.294,
          drawShadow: true,
          flippingTime: 600,
          usePortrait: usePortrait,
          startPage: startPage || 0,
          autoSize: false,
          maxShadowOpacity: 0.4,
          showCover: true,
          mobileScrollSupport: false
        };

        flipbook = new St.PageFlip(container, config);

        var imgs = [];
        for (var i = 1; i <= TOTAL_PAGES; i++) {
          imgs.push(imgUrl(i));
        }

        flipbook.loadFromImages(imgs);

        flipbook.on('flip', function (e) {
          currentPage = e.data;
          var ps2 = calcPs();
          applyView(currentPage, true, ps2);
          updateIndicator(currentPage);
        });

        flipbook.on('changeState', function (e) {
          currentPage = flipbook.getCurrentPageIndex();
          updateIndicator(currentPage);
        });

        updateIndicator(startPage || 0);
      }

      function onResize() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function () {
          var saved = currentPage;
          initFlipbook(saved);
        }, 250);
      }

      // Wire up buttons
      document.getElementById('btn-prev').addEventListener('click', function () {
        if (flipbook) flipbook.flipPrev();
      });

      document.getElementById('btn-next').addEventListener('click', function () {
        if (flipbook) flipbook.flipNext();
      });

      // Keyboard navigation
      document.addEventListener('keydown', function (e) {
        if (e.key === 'ArrowLeft' && flipbook) flipbook.flipPrev();
        if (e.key === 'ArrowRight' && flipbook) flipbook.flipNext();
      });

      window.addEventListener('resize', onResize);

      // Init
      initFlipbook(0);
    })();
  </script>
</body>
</html>
