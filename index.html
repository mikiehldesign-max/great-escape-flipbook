<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Great Escape – Interactive Book</title>
<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: Georgia, serif;
    overflow: hidden;
  }
  #book-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }
  #flipbook-wrapper {
    filter: drop-shadow(0 30px 60px rgba(0,0,0,0.8));
  }
  #flipbook { display: block; }
  #controls {
    display: flex;
    align-items: center;
    gap: 20px;
    user-select: none;
  }
  .ctrl-btn {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .ctrl-btn:hover { background: rgba(255,255,255,0.22); transform: scale(1.1); }
  .ctrl-btn:active { transform: scale(0.95); }
  .ctrl-btn:disabled { opacity: 0.3; cursor: default; transform: none; }
  #page-indicator {
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    letter-spacing: 0.05em;
    min-width: 120px;
    text-align: center;
  }
  #loader {
    position: fixed;
    inset: 0;
    background: #1a1a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 999;
    gap: 18px;
    transition: opacity 0.5s;
  }
  #loader.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 46px; height: 46px;
    border: 4px solid rgba(255,255,255,0.15);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loader p { color: rgba(255,255,255,0.6); font-size: 14px; letter-spacing: 0.06em; }
  @media (max-width: 900px) {
    body { justify-content: flex-start; padding-top: 20px; overflow-y: auto; }
  }
</style>
</head>
<body>
<div id="loader">
  <div class="spinner"></div>
  <p>Loading book…</p>
</div>
<div id="book-container">
  <div id="flipbook-wrapper">
    <div id="flipbook"></div>
  </div>
  <div id="controls">
    <button class="ctrl-btn" id="btn-prev" title="Previous page">←</button>
    <span id="page-indicator">Cover</span>
    <button class="ctrl-btn" id="btn-next" title="Next page">→</button>
  </div>
</div>
<script>
(function () {
  var BASE = 'https://raw.githubusercontent.com/mikiehldesign-max/Great-Escape-OLD/main/';
  var pages = [];
  for (var i = 1; i <= 18; i++) {
    var n = String(i).padStart(2, '0');
    pages.push(BASE + 'great_escape_2013_book_hi__Page_' + n + '.jpg');
  }

  function bookSize() {
    var maxH = window.innerHeight - 110;
    var maxW = window.innerWidth  - 40;
    var single = Math.min(maxH, Math.floor(maxW / 2), 520);
    return single;
  }

  var loaded = 0;
  function preload(srcs, done) {
    if (!srcs.length) { done(); return; }
    srcs.forEach(function(src) {
      var img = new Image();
      img.onload = img.onerror = function() { if (++loaded === srcs.length) done(); };
      img.src = src;
    });
  }

  preload(pages, init);

  function init() {
    document.getElementById('loader').classList.add('hidden');
    var s = bookSize();
    var pageFlip = new St.PageFlip(
      document.getElementById('flipbook'),
      {
        width:  s,
        height: s,
        size: 'fixed',
        maxShadowOpacity: 0.6,
        showCover: true,
        mobileScrollSupport: false,
        useMouseEvents: true,
        drawShadow: true,
        flippingTime: 700,
        startPage: 0,
        autoSize: false
      }
    );

    pageFlip.loadFromImages(pages);

    var btnPrev = document.getElementById('btn-prev');
    var btnNext = document.getElementById('btn-next');
    var indicator = document.getElementById('page-indicator');
    var total = pages.length;

    function updateUI() {
      var cur = pageFlip.getCurrentPageIndex();
      btnPrev.disabled = (cur === 0);
      btnNext.disabled = (cur >= total - 1);
      if (cur === 0) {
        indicator.textContent = 'Front Cover';
      } else if (cur >= total - 1) {
        indicator.textContent = 'Back Cover';
      } else {
        indicator.textContent = 'Page ' + cur + ' of ' + (total - 2);
      }
    }

    pageFlip.on('flip', updateUI);
    pageFlip.on('init', updateUI);
    btnPrev.addEventListener('click', function() { pageFlip.flipPrev('bottom'); });
    btnNext.addEventListener('click', function() { pageFlip.flipNext('bottom'); });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') pageFlip.flipNext('bottom');
      if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   pageFlip.flipPrev('bottom');
    });

    window.addEventListener('resize', function() {
      var ns = bookSize();
      pageFlip.update({ width: ns, height: ns });
    });
  }
})();
</script>
</body>
</html>
