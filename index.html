<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Great Escape – Interactive Book</title>
<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: Georgia, serif;
    overflow: hidden;
  }

  #book-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  /*
   * The flipbook canvas is always 2×pageSize wide (landscape mode).
   * On the cover/back-cover we shift it so only the right (or left)
   * half is visible – making the single cover page appear centred.
   * The wrapper clips to exactly one page width.
   */
  #flipbook-wrapper {
    /* overflow hidden + exact page-width clips the blank half */
    overflow: visible; /* we use translate instead of clip */
    filter: drop-shadow(0 20px 50px rgba(0,0,0,0.9));
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /*
   * .is-cover  → translate right by 25% of the canvas (= half a page)
   *              so the right-side cover is centred in the viewport
   * .is-back   → translate left  by 25% (back cover is on the left)
   * .is-spread → no translation
   */
  #flipbook-wrapper.is-cover  { transform: translateX(25%);  }
  #flipbook-wrapper.is-back   { transform: translateX(-25%); }
  #flipbook-wrapper.is-spread { transform: translateX(0);    }

  #flipbook { display: block; }

  /* Controls */
  #controls {
    display: flex;
    align-items: center;
    gap: 16px;
    user-select: none;
  }

  .ctrl-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ctrl-btn:hover  { background: rgba(255,255,255,0.2); transform: scale(1.08); }
  .ctrl-btn:active { transform: scale(0.93); }
  .ctrl-btn:disabled { opacity: 0.25; cursor: default; transform: none; }

  #page-indicator {
    color: rgba(255,255,255,0.6);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    min-width: 130px;
    text-align: center;
  }

  /* Loading screen */
  #loader {
    position: fixed;
    inset: 0;
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 999;
    gap: 16px;
    transition: opacity 0.6s ease;
  }
  #loader.hidden { opacity: 0; pointer-events: none; }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,0.12);
    border-top-color: rgba(255,255,255,0.8);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loader p {
    color: rgba(255,255,255,0.45);
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  @media (max-width: 700px) {
    body { justify-content: flex-start; padding-top: 16px; overflow-y: auto; overflow-x: hidden; }
  }
</style>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  <p>Loading book…</p>
</div>

<div id="book-container">
  <div id="flipbook-wrapper" class="is-cover">
    <div id="flipbook"></div>
  </div>
  <div id="controls">
    <button class="ctrl-btn" id="btn-prev" title="Previous page">←</button>
    <span id="page-indicator">Front Cover</span>
    <button class="ctrl-btn" id="btn-next" title="Next page">→</button>
  </div>
</div>

<script>
(function () {

  /*
   * Page order (18 pages total):
   *   [0]      front cover  → shown alone on the right  (is-cover)
   *   [1..16]  interior     → shown as two-page spreads  (is-spread)
   *   [17]     back cover   → shown alone on the left    (is-back)
   *
   * StPageFlip with showCover:true + usePortrait:false gives us the
   * spread layout.  The canvas is always 2×pageSize wide.
   * We shift it via CSS to visually centre single-page covers.
   */

  var BASE  = 'https://raw.githubusercontent.com/mikiehldesign-max/Great-Escape-OLD/main/';
  var pages = [];
  for (var i = 1; i <= 18; i++) {
    var n = String(i).padStart(2, '0');
    pages.push(BASE + 'great_escape_2013_book_hi__Page_' + n + '.jpg');
  }
  var TOTAL = pages.length; // 18

  /* ---- sizing ---------------------------------------------------------- */
  function calcPageSize() {
    var vw = window.innerWidth  - 48;
    var vh = window.innerHeight - 100;
    var byW = Math.floor(vw / 2);
    var byH = Math.floor(vh);
    var ps  = Math.min(byW, byH, 500);
    return Math.max(ps, 120);
  }

  /* ---- preload --------------------------------------------------------- */
  var loadedCount = 0;
  function preload(done) {
    pages.forEach(function(src) {
      var img = new Image();
      img.onload = img.onerror = function() {
        if (++loadedCount >= TOTAL) done();
      };
      img.src = src;
    });
  }

  preload(init);

  /* ---- init ------------------------------------------------------------ */
  var pageFlip;

  function init() {
    document.getElementById('loader').classList.add('hidden');

    var ps = calcPageSize();

    pageFlip = new St.PageFlip(
      document.getElementById('flipbook'),
      {
        width:               ps,
        height:              ps,
        size:                'fixed',
        maxShadowOpacity:    0.65,
        showCover:           true,
        usePortrait:         false,
        mobileScrollSupport: false,
        useMouseEvents:      true,
        drawShadow:          true,
        flippingTime:        900,
        startPage:           0,
        autoSize:            false
      }
    );

    pageFlip.loadFromImages(pages);
    pageFlip.on('flip',     onFlip);
    pageFlip.on('changeState', onFlip);
    pageFlip.on('init',     onFlip);

    document.getElementById('btn-prev')
      .addEventListener('click', function() { pageFlip.flipPrev(); });
    document.getElementById('btn-next')
      .addEventListener('click', function() { pageFlip.flipNext(); });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') pageFlip.flipNext();
      if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   pageFlip.flipPrev();
    });

    window.addEventListener('resize', function() {
      var ns = calcPageSize();
      pageFlip.update({ width: ns, height: ns });
    });
  }

  /* ---- flip / state handler ------------------------------------------- */
  function onFlip() {
    var cur     = pageFlip.getCurrentPageIndex();
    var wrapper = document.getElementById('flipbook-wrapper');
    var btnP    = document.getElementById('btn-prev');
    var btnN    = document.getElementById('btn-next');
    var ind     = document.getElementById('page-indicator');

    btnP.disabled = (cur <= 0);
    btnN.disabled = (cur >= TOTAL - 1);

    /* Cover state */
    if (cur === 0) {
      wrapper.className = 'is-cover';
      ind.textContent   = 'Front Cover';
      return;
    }

    /* Back-cover state */
    if (cur >= TOTAL - 1) {
      wrapper.className = 'is-back';
      ind.textContent   = 'Back Cover';
      return;
    }

    /* Interior spread */
    wrapper.className = 'is-spread';
    var spread       = Math.ceil(cur / 2);
    var totalSpreads = Math.floor((TOTAL - 2) / 2);
    ind.textContent  = 'Spread ' + spread + ' of ' + totalSpreads;
  }

})();
</script>
</body>
</html>
